{% extends "base.html" %}

{% block title %}Редактирование записи{% endblock %}

{% block content %}
    <section class="notes-section">
        <h2>✏️ Редактирование записи</h2>
        
        <div class="add-note-form">
            <form method="POST" action="{{ url_for('edit_entry', entry_id=entry_id) }}">
                <div class="form-group">
                    <label for="title">Заголовок записи:</label>
                    <input type="text" id="title" name="title" value="{{ entry.title }}" required>
                </div>
                
                <div class="form-group">
                    <label for="date">Дата:</label>
                    <input type="date" id="date" name="date" value="{{ entry.date }}" required>
                </div>
                
                <div class="form-group">
                    <label for="content">Текст записи:</label>
                    <textarea id="content" name="content" rows="8" required>{{ entry.content }}</textarea>
                </div>
                
                <div class="form-buttons">
                    <button type="submit" class="submit-btn">💾 Сохранить изменения</button>
                    <a href="{{ url_for('notes') }}" class="cancel-btn">❌ Отмена</a>
                </div>
            </form>
        </div>
    </section>
{% endblock %}
